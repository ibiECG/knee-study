    .pill-btn { flex:1; padding:10px; border-radius:11px; border:2px solid #E5E7EB; background:#fff; font-family:'DM Sans',sans-serif; font-weight:500; font-size:15px; cursor:pointer; transition:all .15s; color:#374151; text-align:center; }

    .btn-primary { flex:1; padding:13px 22px; border-radius:13px; border:none; background:#1B4E7A; color:#fff; font-family:'DM Sans',sans-serif; font-size:16px; font-weight:600; cursor:pointer; transition:all .15s; }
    .btn-primary:hover:not(:disabled) { background:#163E64; box-shadow:0 4px 14px rgba(27,78,122,.35); }

    .btn-secondary:hover { border-color:#1B4E7A; color:#1B4E7A; background:#EFF6FF; }
    .score-badge { background:linear-gradient(135deg,#EEF4FF,#E0EEFF); border:1px solid #BFDBFE; border-radius:13px; padding:12px; text-align:center; }
    .status-pill { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

/* ═══════════════════════════════════════
   SUPABASE — from your working version
   ═══════════════════════════════════════ */
const SUPABASE_URL      = "https://hvwafjnloufjkmnzqxkt.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_KDxPcw8CLQBVWjYFM4wrvg_JOFfTCEp";
const SB_HEADERS = {
  'apikey':        SUPABASE_ANON_KEY,
  'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
  'Content-Type':  'application/json',
};

async function sendToSupabase(rec) {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/responses?on_conflict=token`, {
      method:  'POST',
      headers: { ...SB_HEADERS, 'Prefer': 'resolution=merge-duplicates,return=minimal' },
      body:    JSON.stringify(buildRow(rec)),
    });
    if (!res.ok) { const err = await res.text(); return { ok:false, error:err }; }
    return { ok:true };
  } catch(e) { return { ok:false, error:String(e) }; }
}

async function fetchFromSupabase() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/responses?select=*&order=timestamp.desc`, { headers: SB_HEADERS });
    if (!res.ok) return null;
    return await res.json();
  } catch(e) { return null; }
}

/* ═══════════════════════════════════════
   CONSTANTS
   ═══════════════════════════════════════ */
const ADMIN_PASSWORD = "ipbsnRNOH26";
const TOTAL_STEPS = 11;

const STEP_NAMES = {
  1:"Your Details", 2:"About You", 3:"Pain Scores",
  4:"Knee & Satisfaction", 5:"Expectations",
  6:"Walking & Mobility", 7:"Activities",
  8:"Pain Impact", 9:"Quality of Life",
  10:"Other Activities", 11:"Review"
};

/* Option sets */
const DIFF_OPTIONS = [
  {label:"No difficulty",     value:5},
  {label:"Mild difficulty",   value:4},
  {label:"Moderate difficulty",value:3},
  {label:"Severe difficulty", value:2},
  {label:"Needs help",        value:1},
  {label:"Unable to do",      value:0},
];
// compact labels for dual-column layout
const DIFF_SHORT = ["No difficulty","Mild","Moderate","Severe","Needs help","Unable"];

const SAT_OPTIONS = [
  {label:"Very Satisfied",   value:8},{label:"Satisfied",   value:6},
  {label:"Neutral",          value:4},{label:"Dissatisfied",value:2},
  {label:"Very Dissatisfied",value:0},
];
const EXP_OPTIONS = [
  {label:"Much better than expected", value:5},
  {label:"Better than expected",      value:4},
  {label:"Same as expected",          value:3},
  {label:"Worse than expected",       value:2},
  {label:"Much worse than expected",  value:1},
];
const PIF_OPTIONS = [
  {label:"Not at all", value:1},{label:"A little bit",value:2},
  {label:"Somewhat",   value:3},{label:"Quite a bit", value:4},
  {label:"Very much",  value:5},
];
const PIF_SHORT = ["Not at all","A little","Somewhat","Quite a bit","Very much"];
const EQ5D_OPTIONS = [
  {label:"No problems",              value:1},
  {label:"Slight problems",          value:2},
  {label:"Moderate problems",        value:3},
  {label:"Severe problems",          value:4},
  {label:"Extreme / unable to",      value:5},
];
const EQ5D_SHORT = ["None","Slight","Moderate","Severe","Extreme"];

const WALKING_AIDS_OPTS = [
  {label:"No walking aids needed",  value:10},
  {label:"Cane occasionally",       value:7},
  {label:"Cane routinely",          value:4},
  {label:"Two canes or crutches",   value:2},
  {label:"Walker / unable",         value:0},
];
const STANDING_OPTS = [
  {label:"Unlimited",         value:10},{label:"More than 30 min",value:8},
  {label:"10–30 minutes",     value:6}, {label:"5–10 minutes",    value:4},
  {label:"Less than 5 min",   value:2}, {label:"Unable to stand", value:0},
];
const WALKING_DIST_OPTS = [
  {label:"Unlimited (>1 mile)", value:10},{label:"6–10 blocks",       value:8},
  {label:"3–5 blocks",          value:6}, {label:"1–2 blocks",         value:4},
  {label:"Around house only",   value:2}, {label:"Unable to walk",     value:0},
];
const DISC_ACTIVITIES = [
  "Walking / leisure walks","Shopping / errands on foot","Light housework",
  "Cooking / standing in kitchen","Visiting family / grandchildren",
  "Travelling / day trips","Church / community activities","Volunteering",
  "Gardening / yard work","Swimming","Cycling","Dancing","Golf",
  "Bowls / lawn bowls","Yoga / Pilates / stretching","Aerobics / gym classes",
  "Hiking / walking for exercise","Jogging / running","Tennis",
  "Skiing / snowboarding","Other sport",
];
const VAS_COLORS = ['#22C55E','#4ADE80','#86EFAC','#BEF264','#FCD34D','#FBBF24','#F59E0B','#FB923C','#F97316','#EF4444','#DC2626'];

/* ═══════════════════════════════════════
   SCORING
   PROMIS LEF is derived from KSS activity answers — no separate PROMIS section needed.
   PROMIS Pain Intensity is derived from VAS + walking pain + stair pain.
   ═══════════════════════════════════════ */
function calcScores(d, suffix='') {
  const s = suffix; // '' = post-op, '_pre' = pre-op
  const int = (v, def=0) => parseInt(v ?? def) || 0;
  const key = k => k + s; // e.g. 'b1_walk' or 'b1_walk_pre'

  /* KSS B1 Symptoms (0-25) */
  const sym = int(d[key('b1_walk')]) + int(d[key('b1_stairs')]) +
              (s===''?int(d.b1_normal):0); // "feels normal" only post-op

  /* KSS B2 Satisfaction (0-40) */
  const sat = ['b2_sit','b2_lie','b2_getup','b2_house','b2_rec']
    .reduce((t,k)=>t+int(d[key(k)]),0);

  /* KSS B3 Expectations (0-15) — post-op only */
  const exp = s==='' ? ['b3_pain','b3_func','b3_overall'].reduce((t,k)=>t+int(d[k]),0) : 0;

  /* KSS B4a Walking & Standing (0-30) */
  const wlk = int(d[key('b4_aids')]) + int(d[key('b4_stand')]) + int(d[key('b4_dist')]);

  /* KSS B4b Standard Activities (0-30) — includes car & housework */
  const std = ['b4s_up','b4s_dn','b4s_kneel','b4s_rise','b4s_floor','b4s_lat']
    .reduce((t,k)=>t+int(d[key(k)]),0);

  /* KSS B4c Advanced Activities (0-25) */
  const adv = ['b4a_twist','b4a_floor','b4a_run','b4a_jump','b4a_stop']
    .reduce((t,k)=>t+int(d[key(k)]),0);

  /* KSS B4d Discretionary — post-op only */
  const sel = s==='' ? (d.disc_sel||[]) : [];
  const disc = sel.slice(0,3).reduce((t,a)=>t+int(d['disc_'+a]),0);

  const func = wlk + std + adv + disc;
  const subjective = sym + sat + exp;

  /* VAS */
  const vas = s==='' ? int(d.vas) : int(d.vas_pre);

  /* ─── PROMIS LEF derived from KSS answers ───
     Map KSS 5-scale difficulty to PROMIS 1–5:
       5→5, 4→4, 3→3, 2→2, 1/0→1
     Map standing opts to PROMIS: ≥8pts→5, 6→4, 4→3, 2→2, 0→1 */
  const diffToLef = v => v >= 1 ? v : 1;
  const standToLef = v => v>=8?5 : v>=6?4 : v>=4?3 : v>=2?2 : 1;

  const lef1 = diffToLef(int(d[key('b4s_up')]));           // stairs
  const lef2 = diffToLef(int(d[key('housework')]));         // heavy housework
  const lef3 = diffToLef(int(d[key('car')]));               // get in/out car
  const lef4 = standToLef(int(d[key('b4_stand')]));         // stand 30 min
  const lefRaw = lef1 + lef2 + lef3 + lef4;               // range 4–20

  /* ─── PROMIS Pain Intensity derived from pain questions ───
     pi1 (worst)   = VAS (overall worst pain)
     pi2 (average) = walking pain (b1_walk)
     pi3 (current) = stair pain proxy (b1_stairs) — post-op has explicit pi3 */
  const pi1 = vas; // VAS as worst pain (0-10)
  const pi2 = int(d[key('b1_walk')]); // walking pain as average
  const pi3 = s==='' ? int(d.pi3) : int(d[key('b1_stairs')]); // current / stair
  const piRaw = pi1 + pi2 + pi3; // range 0–30

  /* PROMIS Pain Interference (asked directly, side-by-side) */
  const pifRaw = ['pif1','pif2','pif3','pif4'].reduce((t,k)=>t+int(d[key(k)]),0);

  /* EQ-5D */
  const eq5dSum = ['eq_mob','eq_self','eq_usual','eq_pain','eq_anx']
    .reduce((t,k)=>t+int(d[key(k)]),0);
  const eqVas = s==='' ? int(d.eq_vas,50) : int(d.eq_vas_pre,50);

  return {sym,sat,exp,wlk,std,adv,disc,func,subjective,
    vas,lefRaw,piRaw,pifRaw,eq5dSum,eqVas};
}

function buildRow(rec) {
  const d = rec.data;
  const sc = calcScores(d,'');
  const scPre = calcScores(d,'_pre');
  return {
    token: rec.token, status: rec.status, timestamp: rec.timestamp,
    last_step: STEP_NAMES[rec.lastStep] || String(rec.lastStep),
    contact_name:  d.contact_name||'',  contact_email: d.contact_email||'',
    contact_phone: d.contact_phone||'', survey_date:   d.survey_date||'',
    dob:      d.dob==='dk'?'NK':(d.dob||''),  sex: d.sex||'',
    height:   d.height_ft==='dk'?'NK':`${d.height_ft||''}'${d.height_in||''}"`,
    weight:   d.weight==='dk'?'NK':String(d.weight||''),
    ethnicity: d.ethnicity||'', surgeon: d.surgeon==='dk'?'NK':(d.surgeon||''), side: d.side||'',
    // Post-op KSS
    kss_sym: sc.sym, kss_sat: sc.sat, kss_exp: sc.exp,
    kss_wlk: sc.wlk, kss_std: sc.std, kss_adv: sc.adv, kss_disc: sc.disc,
    kss_func: sc.func, kss_subj: sc.subjective,
    // Post-op other
    vas_postop: sc.vas, global_sat: d.global_sat||'',
    promis_lef: sc.lefRaw, promis_pi: sc.piRaw, promis_pif: sc.pifRaw,
    eq_mob: d.eq_mob, eq_self: d.eq_self, eq_usual: d.eq_usual,
    eq_pain: d.eq_pain, eq_anx: d.eq_anx, eq5d_sum: sc.eq5dSum, eq_vas: sc.eqVas,
    // Pre-op recall scores
    pre_kss_sym: scPre.sym, pre_kss_sat: scPre.sat,
    pre_kss_wlk: scPre.wlk, pre_kss_std: scPre.std, pre_kss_adv: scPre.adv,
    pre_kss_func: scPre.func, pre_kss_subj: scPre.subjective,
    pre_vas: scPre.vas, pre_promis_lef: scPre.lefRaw,
    pre_promis_pi: scPre.piRaw, pre_promis_pif: scPre.pifRaw,
    pre_eq5d_sum: scPre.eq5dSum, pre_eq_vas: scPre.eqVas,
    // Deltas (post - pre)
    delta_kss_func: sc.func - scPre.func,
    delta_vas: sc.vas - scPre.vas,
    delta_promis_lef: sc.lefRaw - scPre.lefRaw,
    delta_pif: sc.pifRaw - scPre.pifRaw,
  };
}

function genToken() {
  return `KNE-${Date.now().toString(36).toUpperCase()}-${Math.random().toString(36).slice(2,6).toUpperCase()}`;
}

/* ═══════════════════════════════════════

function ProgressBar({step,total}) {
  const pct = Math.round((step/total)*100);
  return (
    <div style={{marginBottom:20}}>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:12,fontWeight:500,color:'#9CA3AF',marginBottom:5}}>
        <span>{STEP_NAMES[step]||''}</span><span>Step {step} of {total} · {pct}%</span>
      </div>
      <div style={{height:5,background:'#E5E7EB',borderRadius:3,overflow:'hidden'}}>
        <div className="prog-bar" style={{height:'100%',width:`${pct}%`,background:'linear-gradient(90deg,#1B4E7A,#2E7DAF)',borderRadius:3}}/>
      </div>
    </div>
  );
}

  return (

      {tag&&<p style={{fontSize:11,fontWeight:600,letterSpacing:'.08em',color:'#2E7DAF',textTransform:'uppercase',marginBottom:3}}>{tag}</p>}
      <h2 className="serif" style={{fontSize:22,fontWeight:700,color:'#111827',lineHeight:1.25,marginBottom:subtitle?5:0}}>{title}</h2>
      {subtitle&&<p style={{fontSize:14,color:'#6B7280',lineHeight:1.5}}>{subtitle}</p>}
    </div>
  );
}

function DualHeader() {

    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>

      <div style={{background:'#EDE9FE',borderRadius:10,padding:'7px 10px',textAlign:'center',fontSize:12,fontWeight:700,color:'#6D28D9',letterSpacing:'.04em'}}>🟣 BEFORE surgery</div>

function FormField({label,required,error,children,hint}) {

      {children}
      {error&&<p style={{fontSize:12,color:'#EF4444',marginTop:3}}>{error}</p>}

/* Dual slider: post=blue, pre=purple */
function DualSlider({label, postKey, preKey, d, set, min=0, max=10}) {
  const postVal = Number(d[postKey] ?? 5);
  const preVal  = Number(d[preKey]  ?? 5);
  const postPct = ((postVal-min)/(max-min))*100;
  const prePct  = ((preVal -min)/(max-min))*100;
  return (
    <div style={{marginBottom:20}}>
      <p style={{fontWeight:600,color:'#1F2937',marginBottom:10}}>{label}</p>
      <div className="dual-grid">
        <div className="post-panel">
          <div className="post-label">After surgery</div>
          <div style={{fontSize:28,fontWeight:700,fontFamily:'Fraunces,serif',color:VAS_COLORS[postVal],textAlign:'center',lineHeight:1,marginBottom:6}}>{postVal}</div>
          <input type="range" className="vas-slider" min={min} max={max} value={postVal}
            style={{'--pct':`${postPct}%`}} onChange={e=>set(postKey,Number(e.target.value))}/>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'#9CA3AF',marginTop:4}}>
            <span>No pain</span><span>Worst</span>
          </div>
        </div>
        <div className="pre-panel">
          <div className="pre-label">Before surgery</div>

/* Delta badge shown between sections */
function DeltaBadge({postKey, preKey, d, label='Change', lowerIsBetter=true}) {
  if (d[postKey]===undefined || d[preKey]===undefined) return null;
  const delta = Number(d[postKey]) - Number(d[preKey]);
  if (delta===0) return null;
  const improved = lowerIsBetter ? delta<0 : delta>0;
  const col = improved ? '#16A34A' : '#DC2626';
  const sign = delta>0 ? '+' : '';
  return (
    <div style={{background:improved?'#F0FDF4':'#FEF2F2',border:`1px solid ${improved?'#BBF7D0':'#FCA5A5'}`,borderRadius:10,padding:'6px 12px',marginBottom:12,display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:13}}>
      <span style={{color:'#6B7280'}}>{label}</span>
      <span style={{fontWeight:700,color:col}}>{sign}{delta} {improved?'✓':''}</span>
    </div>
  );
}

function QualityOfLife({d,set,onBack,onNext}) {
  const EQ_QS = [
    {postKey:'eq_mob',  preKey:'eq_mob_pre',  label:'Mobility', desc:'Your ability to walk about'},
    {postKey:'eq_self', preKey:'eq_self_pre', label:'Self-Care', desc:'Washing or dressing yourself'},
    {postKey:'eq_usual',preKey:'eq_usual_pre',label:'Usual Activities', desc:'Work, study, housework, family or leisure'},
    {postKey:'eq_pain', preKey:'eq_pain_pre', label:'Pain / Discomfort', desc:'Pain or discomfort you have'},
    {postKey:'eq_anx',  preKey:'eq_anx_pre',  label:'Anxiety / Depression', desc:'How anxious or depressed you feel'},
  ];
  const answered = EQ_QS.filter(q=>d[q.postKey]!==undefined&&d[q.preKey]!==undefined).length;
  const eqVas = Number(d.eq_vas??50);
  const eqVasPre = Number(d.eq_vas_pre??50);
  const ok = answered===5;
  return (
    <div className="fade-up">
      <SectionHeader tag="Section F · Quality of Life" title="Your Overall Health" subtitle="Answer for TODAY (after surgery) and how you remember feeling BEFORE surgery."/>
      <DualHeader/>
      {EQ_QS.map(q=>(
        <div key={q.postKey} style={{marginBottom:18}}>
          <p style={{fontWeight:600,color:'#1F2937',fontSize:14,marginBottom:2}}>{q.label}</p>
          <p style={{fontSize:12,color:'#6B7280',marginBottom:8}}>{q.desc}</p>
          <DualButtons label="" postKey={q.postKey} preKey={q.preKey}
            options={EQ5D_OPTIONS} shortLabels={EQ5D_SHORT} d={d} set={set}/>
        </div>
      ))}
      {/* EQ VAS dual */}
      <div style={{marginBottom:18}}>
        <p style={{fontWeight:600,color:'#1F2937',marginBottom:10}}>Rate your overall health (0 = worst, 100 = best)</p>
        <div className="dual-grid">
          <div className="post-panel">
            <div className="post-label">After surgery</div>
            <div style={{fontSize:28,fontWeight:700,fontFamily:'Fraunces,serif',color:'#1B4E7A',textAlign:'center',lineHeight:1,marginBottom:6}}>{eqVas}</div>
            <input type="range" className="vas-slider" min={0} max={100} value={eqVas}
              style={{'--pct':`${eqVas}%`}} onChange={e=>set('eq_vas',Number(e.target.value))}/>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'#9CA3AF',marginTop:4}}><span>0 Worst</span><span>100 Best</span></div>
          </div>
          <div className="pre-panel">
            <div className="pre-label">Before surgery</div>
            <div style={{fontSize:28,fontWeight:700,fontFamily:'Fraunces,serif',color:'#7C3AED',textAlign:'center',lineHeight:1,marginBottom:6}}>{eqVasPre}</div>
            <input type="range" className="vas-slider pre" min={0} max={100} value={eqVasPre}
              style={{'--pct':`${eqVasPre}%`}} onChange={e=>set('eq_vas_pre',Number(e.target.value))}/>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'#9CA3AF',marginTop:4}}><span>0 Worst</span><span>100 Best</span></div>
          </div>
        </div>
      </div>
      <NavBtns onBack={onBack} onNext={onNext} disabled={!ok}/>
    </div>
  );
}

/* ═══════════════════════════════════════
   STEP 10: OTHER ACTIVITIES + GLOBAL SAT
   ═══════════════════════════════════════ */
function OtherActivities({d,set,onBack,onNext}) {
  const sel = d.disc_sel||[];
  const toggle = act => sel.includes(act)?set('disc_sel',sel.filter(a=>a!==act)):sel.length<3&&set('disc_sel',[...sel,act]);
  const discOk = sel.length===0 || sel.every(a=>d['disc_'+a]!==undefined);
  const ok = d.global_sat && discOk;
  return (
    <div className="fade-up">
      <SectionHeader tag="Section G · Other Activities & Satisfaction" title="Almost There!" subtitle="Two final questions."/>

      {/* Global satisfaction */}
      <div style={{background:'#F8FAFF',border:'1px solid #E0E7FF',borderRadius:14,padding:'16px',marginBottom:20}}>
        <p style={{fontWeight:600,color:'#1F2937',marginBottom:10}}>Overall, how satisfied are you with the result of your knee surgery?</p>
        {[{label:'Very satisfied',value:'very_satisfied'},{label:'Satisfied',value:'satisfied'},{label:'Neutral / unsure',value:'neutral'},{label:'Dissatisfied',value:'dissatisfied'},{label:'Very dissatisfied',value:'very_dissatisfied'}].map(o=>(
          <button key={o.value} type="button" className={`opt-btn${d.global_sat===o.value?' active':''}`} onClick={()=>set('global_sat',o.value)}>{o.label}</button>
        ))}
      </div>

      {/* Discretionary — optional */}
      <div style={{background:'#F9FAFB',border:'1px solid #F3F4F6',borderRadius:14,padding:'16px'}}>
        <p style={{fontWeight:600,color:'#1F2937',marginBottom:4}}>Leisure & recreational activities <span style={{fontWeight:400,color:'#9CA3AF',fontSize:13}}>(optional)</span></p>
        <p style={{fontSize:13,color:'#6B7280',marginBottom:10}}>If any of these activities are important to you, select up to 3 and rate your ability now.</p>
        <div style={{display:'flex',flexWrap:'wrap',gap:7,marginBottom:14}}>
          {DISC_ACTIVITIES.map(act=>{const isSel=sel.includes(act),isMax=!isSel&&sel.length>=3;return<button key={act} type="button" className={`tag-btn${isSel?' active':''}${isMax?' disabled':''}`} onClick={()=>!isMax&&toggle(act)}>{act}</button>;})}
        </div>
        {sel.length>0&&(
          <div style={{borderTop:'1px solid #E5E7EB',paddingTop:12}}>
            <p style={{fontSize:13,fontWeight:600,color:'#1B4E7A',marginBottom:10}}>How difficult now due to your knee?</p>
            {sel.map(act=>(
              <div key={act} style={{marginBottom:14}}>
                <p style={{fontWeight:500,color:'#1F2937',marginBottom:6,fontSize:14}}>{act}</p>
                {DIFF_OPTIONS.map(o=><button key={o.value} type="button" className={`opt-btn${Number(d['disc_'+act])===o.value?' active':''}`} onClick={()=>set('disc_'+act,o.value)}>{o.label}</button>)}
              </div>
            ))}
          </div>
        )}
      </div>
      <NavBtns onBack={onBack} onNext={onNext} disabled={!ok}/>
    </div>
  );
}

function AdminDashboard({localSubs,onLogout}) {
  const [rows,setRows]=useState([]);
  const [loading,setLoading]=useState(true);
  const [loadError,setLoadError]=useState('');
  const [lastRefresh,setLastRefresh]=useState(null);
  const [tab,setTab]=useState('submissions');
  const [filterStatus,setFilterStatus]=useState('all');
  const [filterSide,setFilterSide]=useState('');
  const [filterSurgeon,setFilterSurgeon]=useState('');
  const [expanded,setExpanded]=useState(null);

  const load = useCallback(async()=>{
    setLoading(true); setLoadError('');
    const data = await fetchFromSupabase();
    if(data) { setRows(data); setLastRefresh(new Date()); }
    else setLoadError('Could not load from Supabase. Check credentials.');
    setLoading(false);
  },[]);

  useEffect(()=>{load();},[load]);

  const subs = rows.length>0 ? rows : localSubs;
  const complete = subs.filter(s=>s.status==='complete');
  const partial  = subs.filter(s=>s.status==='partial');
  const avg = fn => complete.length?(complete.reduce((s,r)=>s+fn(r),0)/complete.length).toFixed(1):'—';

  const filtered = subs.filter(s=>{
    if(filterStatus!=='all'&&s.status!==filterStatus) return false;
    if(filterSide&&(s.side||'')!==filterSide) return false;
    if(filterSurgeon&&!(s.surgeon||'').toLowerCase().includes(filterSurgeon.toLowerCase())) return false;
    return true;
  });

  const exportCSV=(data,filename)=>{
    const csv=data.map(r=>Object.values(r).map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\n');
    const h=data.length>0?Object.keys(data[0]).join(','):'';
    const url=URL.createObjectURL(new Blob([h+'\n'+csv],{type:'text/csv'}));
    const a=document.createElement('a');a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);
  };
  const exportAll=()=>exportCSV(filtered,`knee-outcomes-${new Date().toISOString().split('T')[0]}.csv`);
  const exportFollowUp=()=>exportCSV(
    partial.filter(s=>s.contact_email||s.contact_phone).map(s=>({token:s.token,name:s.contact_name||'',email:s.contact_email||'',phone:s.contact_phone||'',last_step:s.last_step||'',timestamp:s.timestamp||''})),
    `follow-up-${new Date().toISOString().split('T')[0]}.csv`
  );

  return (
    <div className="fade-up">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18,flexWrap:'wrap',gap:8}}>
        <div>
          <h2 className="serif" style={{fontSize:24,fontWeight:700,color:'#111827'}}>Admin Dashboard</h2>
          <p style={{fontSize:13,color:'#6B7280'}}>IPBSN / Knee Surgery — Patient-Reported Outcomes</p>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <button onClick={load} disabled={loading}
            style={{fontSize:12,color:'#1B4E7A',background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:8,padding:'5px 11px',cursor:loading?'wait':'pointer',fontFamily:'DM Sans,sans-serif',fontWeight:500}}>
            {loading?'⏳...':'🔄 Refresh'}
          </button>
          <button onClick={onLogout} style={{fontSize:13,color:'#9CA3AF',textDecoration:'underline',background:'none',border:'none',cursor:'pointer'}}>Log out</button>
        </div>
      </div>

      {loadError&&<div style={{background:'#FFF7ED',border:'1px solid #FED7AA',borderRadius:11,padding:'9px 13px',marginBottom:14,fontSize:13,color:'#92400E'}}>⚠️ {loadError}</div>}
      {loading&&rows.length===0&&<div style={{textAlign:'center',padding:'36px 0',color:'#9CA3AF'}}>⏳ Loading from Supabase…</div>}
      {lastRefresh&&!loading&&<p style={{fontSize:11,color:'#D1D5DB',marginBottom:10,textAlign:'right'}}>Synced: {lastRefresh.toLocaleTimeString()}</p>}

      {/* Tabs */}
      <div style={{display:'flex',gap:4,background:'#F3F4F6',borderRadius:11,padding:4,marginBottom:18}}>
        {[['submissions','Submissions'],['dropoffs','Drop-offs'],['analytics','Analytics']].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:'7px 4px',borderRadius:8,border:'none',cursor:'pointer',fontSize:13,fontWeight:500,fontFamily:'DM Sans,sans-serif',background:tab===k?'#fff':'transparent',color:tab===k?'#1B4E7A':'#6B7280',boxShadow:tab===k?'0 1px 4px rgba(0,0,0,.08)':'none',transition:'all .15s'}}>{l}</button>
        ))}
      </div>

      {/* ── SUBMISSIONS ── */}
      {tab==='submissions'&&(<>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:14}}>
          {[{l:'Total',v:subs.length},{l:'Complete',v:complete.length,c:'#16A34A'},{l:'Partial',v:partial.length,c:'#D97706'},{l:'Avg KSS',v:avg(s=>s.kss_func??0),u:'/100'},{l:'Avg VAS',v:avg(s=>s.vas_postop??0),u:'/10'},{l:'Avg VAS Δ',v:(()=>{const p=complete.filter(s=>s.delta_vas!=null);return p.length?(p.reduce((t,r)=>t+r.delta_vas,0)/p.length).toFixed(1):'—';})()}].map(c=>(
            <div key={c.l} style={{background:'#fff',borderRadius:12,padding:'11px 12px',textAlign:'center',border:'1px solid #F3F4F6'}}>
              <p style={{fontSize:10,color:'#9CA3AF',marginBottom:2,textTransform:'uppercase'}}>{c.l}</p>
              <p style={{fontSize:20,fontWeight:700,fontFamily:'Fraunces,serif',color:c.c||'#1B4E7A'}}>{c.v}<span style={{fontSize:10,color:'#D1D5DB'}}>{c.u||''}</span></p>
            </div>
          ))}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:11}}>
          {[['Status',<select key="s" className="inp" style={{padding:'7px 10px',fontSize:12}} value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}><option value="all">All</option><option value="complete">Complete</option><option value="partial">Partial</option></select>],['Side',<select key="si" className="inp" style={{padding:'7px 10px',fontSize:12}} value={filterSide} onChange={e=>setFilterSide(e.target.value)}><option value="">Both</option><option value="Left">Left</option><option value="Right">Right</option></select>],['Surgeon',<input key="su" type="text" className="inp" style={{padding:'7px 10px',fontSize:12}} placeholder="All" value={filterSurgeon} onChange={e=>setFilterSurgeon(e.target.value)}/>]].map(([l,c])=>(
            <div key={l}><label style={{fontSize:10,color:'#6B7280',display:'block',marginBottom:3}}>{l}</label>{c}</div>
          ))}
        </div>
        <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginBottom:11}}>
          <button onClick={exportFollowUp} style={{padding:'8px 14px',background:'#F59E0B',color:'#fff',borderRadius:9,border:'none',cursor:'pointer',fontSize:12,fontWeight:600}}>📋 Follow-up ({partial.filter(s=>s.contact_email||s.contact_phone).length})</button>
          <button onClick={exportAll} style={{padding:'8px 14px',background:'#16A34A',color:'#fff',borderRadius:9,border:'none',cursor:'pointer',fontSize:12,fontWeight:600}}>⬇ Export CSV ({filtered.length})</button>
        </div>
        {filtered.length===0?<div style={{textAlign:'center',padding:'36px',background:'#fff',borderRadius:14}}><p style={{fontSize:28,marginBottom:7}}>📋</p><p style={{fontWeight:600,color:'#4B5563'}}>{subs.length===0?'No submissions yet':'No matches'}</p></div>:(
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
              <thead><tr style={{background:'#F9FAFB',borderBottom:'2px solid #E5E7EB'}}>
                {['Status','Token','Date','Side','Name','Last Step','VAS↗','VAS Pre','Δ VAS','KSS Func',''].map(h=>(
                  <th key={h} style={{padding:'8px 9px',textAlign:'left',fontSize:9,fontWeight:600,color:'#6B7280',textTransform:'uppercase',whiteSpace:'nowrap'}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>
                {filtered.map(s=>{
                  const isExp=expanded===s.token;
                  const delta=s.delta_vas;
                  return(
                    <React.Fragment key={s.token}>
                      <tr style={{borderBottom:'1px solid #F3F4F6',background:isExp?'#F8FAFF':'#fff'}}>
                        <td style={{padding:'8px 9px'}}><span className={`status-pill ${s.status==='complete'?'status-complete':'status-partial'}`}>{s.status==='complete'?'✓':'⏸'}</span></td>
                        <td style={{padding:'8px 9px',fontFamily:'monospace',fontSize:9,color:'#9CA3AF'}}>{(s.token||'').slice(0,12)}</td>
                        <td style={{padding:'8px 9px',whiteSpace:'nowrap'}}>{s.timestamp?new Date(s.timestamp).toLocaleDateString('en-GB'):''}</td>
                        <td style={{padding:'8px 9px'}}>{s.side&&<span style={{padding:'2px 7px',borderRadius:20,fontSize:9,fontWeight:600,background:s.side==='Left'?'#DBEAFE':'#EDE9FE',color:s.side==='Left'?'#1E40AF':'#6D28D9'}}>{s.side}</span>}</td>
                        <td style={{padding:'8px 9px',maxWidth:80,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.contact_name||'—'}</td>
                        <td style={{padding:'8px 9px',fontSize:10,color:'#6B7280'}}>{s.last_step||'—'}</td>
                        <td style={{padding:'8px 9px',fontWeight:600,color:'#1B4E7A',textAlign:'center'}}>{s.vas_postop??'—'}</td>
                        <td style={{padding:'8px 9px',fontWeight:600,color:'#7C3AED',textAlign:'center'}}>{s.pre_vas??'—'}</td>
                        <td style={{padding:'8px 9px',fontWeight:600,textAlign:'center',color:delta<0?'#16A34A':delta>0?'#DC2626':'#6B7280'}}>{delta!=null?(delta>0?`+${delta}`:delta):'—'}</td>
                        <td style={{padding:'8px 9px',fontWeight:600,color:'#1B4E7A',textAlign:'center'}}>{s.kss_func??'—'}</td>
                        <td style={{padding:'8px 9px'}}><button onClick={()=>setExpanded(isExp?null:s.token)} style={{fontSize:10,color:'#1B4E7A',background:'#EFF6FF',border:'none',cursor:'pointer',padding:'3px 8px',borderRadius:7,fontWeight:600}}>{isExp?'Close':'Details'}</button></td>
                      </tr>
                      {isExp&&(
                        <tr><td colSpan={11} style={{background:'#F8FAFF',padding:0}}>
                          <div style={{padding:'14px',display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:7}}>
                            {(s.contact_email||s.contact_phone)&&(
                              <div style={{gridColumn:'1/-1',background:'#FFFBEB',border:'1px solid #FDE68A',borderRadius:10,padding:'10px 12px',marginBottom:4}}>
                                <div style={{display:'flex',gap:14,flexWrap:'wrap',fontSize:12,color:'#78350F'}}>
                                  {s.contact_name&&<span>👤 {s.contact_name}</span>}
                                  {s.contact_email&&<span>✉️ <a href={`mailto:${s.contact_email}`} style={{color:'#1B4E7A'}}>{s.contact_email}</a></span>}
                                  {s.contact_phone&&<span>📱 {s.contact_phone}</span>}
                                </div>
                              </div>
                            )}
                            {[
                              ['KSS Func (post)',s.kss_func,100],['KSS Func (pre)',s.pre_kss_func,100],
                              ['KSS Symptoms',s.kss_sym,25],['PROMIS LEF (post)',s.promis_lef,20],
                              ['PROMIS LEF (pre)',s.pre_promis_lef,20],['Pain Interference (post)',s.promis_pif,20],
                              ['Pain Interference (pre)',s.pre_promis_pif,20],['EQ-5D Sum (post)',s.eq5d_sum,25],
                              ['EQ-5D Sum (pre)',s.pre_eq5d_sum,25],['EQ VAS (post)',s.eq_vas,100],
                              ['EQ VAS (pre)',s.pre_eq_vas,100],['Global Satisfaction',s.global_sat||'—',null],
                            ].map(([l,v,mx])=>(
                              <div key={l} style={{display:'flex',justifyContent:'space-between',alignItems:'center',background:'#fff',padding:'7px 10px',borderRadius:8,fontSize:11}}>
                                <span style={{color:'#6B7280'}}>{l}</span>
                                <span style={{fontWeight:600,color:'#1B4E7A'}}>{v!=null?v:'—'}{mx&&typeof v==='number'?<span style={{fontWeight:400,color:'#D1D5DB'}}>/{mx}</span>:''}</span>
                              </div>
                            ))}
                          </div>
                        </td></tr>
                      )}
                    </React.Fragment>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </>)}

      {/* ── DROP-OFFS ── */}
      {tab==='dropoffs'&&(
        <div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:14}}>
            {[{l:'Started',v:subs.length,c:'#1B4E7A'},{l:'Completed',v:complete.length,c:'#16A34A'},{l:'Dropped off',v:partial.length,c:'#D97706'}].map(c=>(
              <div key={c.l} style={{background:'#fff',borderRadius:12,padding:'12px',textAlign:'center',border:'1px solid #F3F4F6'}}>
                <p style={{fontSize:10,color:'#9CA3AF',marginBottom:2,textTransform:'uppercase'}}>{c.l}</p>
                <p style={{fontSize:24,fontWeight:700,fontFamily:'Fraunces,serif',color:c.c}}>{c.v}</p>
                {c.l==='Dropped off'&&subs.length>0&&<p style={{fontSize:10,color:'#9CA3AF'}}>{Math.round((partial.length/subs.length)*100)}% rate</p>}
              </div>
            ))}
          </div>
          <div style={{background:'#fff',borderRadius:14,padding:'14px',border:'1px solid #F3F4F6'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:11}}>
              <p style={{fontWeight:600,color:'#1F2937',fontSize:14}}>Contactable patients</p>
              <button onClick={exportFollowUp} style={{fontSize:11,color:'#F59E0B',fontWeight:600,background:'#FFFBEB',border:'1px solid #FDE68A',borderRadius:7,padding:'4px 10px',cursor:'pointer'}}>Export</button>
            </div>
            {partial.filter(s=>s.contact_email||s.contact_phone).length===0?
              <p style={{fontSize:13,color:'#9CA3AF',textAlign:'center',padding:'16px 0'}}>No contactable partials yet.</p>:
              partial.filter(s=>s.contact_email||s.contact_phone).map(s=>(
                <div key={s.token} style={{display:'flex',justifyContent:'space-between',padding:'10px 0',borderBottom:'1px solid #F9FAFB',flexWrap:'wrap',gap:7}}>
                  <div>
                    <p style={{fontWeight:600,color:'#1F2937',fontSize:13}}>{s.contact_name||'Anonymous'}</p>
                    {s.contact_email&&<p style={{fontSize:11,color:'#1B4E7A'}}><a href={`mailto:${s.contact_email}`}>{s.contact_email}</a></p>}
                    {s.contact_phone&&<p style={{fontSize:11,color:'#6B7280'}}>{s.contact_phone}</p>}
                  </div>
                  <div style={{textAlign:'right'}}>
                    <span className="status-pill status-partial" style={{display:'block',marginBottom:3,fontSize:10}}>Stopped: {s.last_step||'—'}</span>
                    <span style={{fontSize:10,color:'#9CA3AF'}}>{s.timestamp?new Date(s.timestamp).toLocaleDateString('en-GB'):''}</span>
                  </div>
                </div>
              ))
            }
          </div>
        </div>
      )}

      {/* ── ANALYTICS ── */}
      {tab==='analytics'&&(
        <div>
          {complete.length===0?<div style={{textAlign:'center',padding:'40px',background:'#fff',borderRadius:14}}><p style={{fontSize:28,marginBottom:7}}>📊</p><p style={{fontWeight:600,color:'#4B5563'}}>No complete submissions yet</p></div>:(
            <>
              <div style={{background:'#fff',borderRadius:14,padding:'18px',marginBottom:11,border:'1px solid #F3F4F6'}}>
                <p style={{fontWeight:600,color:'#1F2937',marginBottom:14}}>VAS Pain — Pre vs Post</p>
                {(()=>{const p=complete.filter(s=>s.pre_vas!=null);return[
                  ['Pre-op recall avg', p.length?(p.reduce((t,r)=>t+r.pre_vas,0)/p.length).toFixed(1):null,'#7C3AED'],
                  ['Post-op avg', (complete.reduce((t,r)=>t+(r.vas_postop??0),0)/complete.length).toFixed(1),'#1B4E7A'],
                  ['Mean improvement', p.length?(p.reduce((t,r)=>t+(r.pre_vas??0)-(r.vas_postop??0),0)/p.length).toFixed(1):null,'#16A34A'],
                ].map(([l,v,col])=>v===null?null:(
                  <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'9px 0',borderBottom:'1px solid #F9FAFB'}}>
                    <span style={{fontSize:14,color:'#374151'}}>{l}</span>
                    <span style={{fontSize:20,fontWeight:700,fontFamily:'Fraunces,serif',color:col}}>{v}/10</span>
                  </div>
                ));})()}
              </div>
              <div style={{background:'#fff',borderRadius:14,padding:'18px',border:'1px solid #F3F4F6'}}>
                <p style={{fontWeight:600,color:'#1F2937',marginBottom:14}}>Average Scores (Post-op)</p>
                {[{l:'KSS Functional (/100)',fn:s=>s.kss_func??0,max:100},{l:'KSS Symptoms (/25)',fn:s=>s.kss_sym??0,max:25},{l:'PROMIS LEF (/20)',fn:s=>s.promis_lef??0,max:20},{l:'EQ-5D Sum (/25)',fn:s=>s.eq5d_sum??0,max:25}].map(({l,fn,max})=>{
                  const a=complete.reduce((t,r)=>t+fn(r),0)/complete.length;
                  return(<div key={l} style={{marginBottom:12}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}><span style={{fontSize:13,color:'#374151'}}>{l}</span><span style={{fontSize:13,fontWeight:600,color:'#1B4E7A'}}>{a.toFixed(1)}</span></div><div style={{height:7,background:'#F3F4F6',borderRadius:3,overflow:'hidden'}}><div style={{height:'100%',width:`${(a/max)*100}%`,background:'linear-gradient(90deg,#1B4E7A,#2E7DAF)',borderRadius:3}}/></div></div>);
                })}
              </div>
            </>
          )}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════
   APP
   ═══════════════════════════════════════ */
function App() {
  const [view,setView]=useState('survey');
  const [step,setStep]=useState(0);
  const [token]=useState(()=>genToken());
  const [data,setData]=useState({
    survey_date:new Date().toISOString().split('T')[0],
    b1_walk:0, b1_walk_pre:5,
    b1_stairs:0, b1_stairs_pre:5,
    vas:0, vas_pre:5,
    pi3:0,
    eq_vas:50, eq_vas_pre:50,
  });
  const [localSubs,setLocalSubs]=useState([]);
  const [adminIn,setAdminIn]=useState(false);
  const [submitting,setSubmitting]=useState(false);
  const [submitError,setSubmitError]=useState('');

  const set=useCallback((k,v)=>setData(p=>({...p,[k]:v})),[]);

  const go=useCallback((n)=>{
    setStep(n); window.scrollTo({top:0,behavior:'smooth'});
  },[]);

  const handleSubmit=async()=>{
    setSubmitting(true); setSubmitError('');
    const rec={id:token,token,timestamp:new Date().toISOString(),lastStep:11,status:'complete',data:{...data}};
    const result=await sendToSupabase(rec);
    if(!result.ok){setSubmitError('Something went wrong. Please try again.');setSubmitting(false);return;}
    setLocalSubs(p=>[...p,rec]);
    setSubmitting(false);
    setStep(12);
    window.scrollTo({top:0,behavior:'smooth'});
  };

  const renderStep=()=>{
    switch(step){
      case 0:  return <Welcome onStart={()=>go(1)}/>;
      case 1:  return <ContactInfo d={data} set={set} token={token} onNext={()=>go(2)}/>;
      case 2:  return <Demographics d={data} set={set} onBack={()=>go(1)} onNext={()=>go(3)}/>;
      case 3:  return <PainSection d={data} set={set} onBack={()=>go(2)} onNext={()=>go(4)}/>;
      case 4:  return <KneeSatisfaction d={data} set={set} onBack={()=>go(3)} onNext={()=>go(5)}/>;
      case 5:  return <Expectations d={data} set={set} onBack={()=>go(4)} onNext={()=>go(6)}/>;
      case 6:  return <WalkingMobility d={data} set={set} onBack={()=>go(5)} onNext={()=>go(7)}/>;
      case 7:  return <Activities d={data} set={set} onBack={()=>go(6)} onNext={()=>go(8)}/>;
      case 8:  return <PainImpact d={data} set={set} onBack={()=>go(7)} onNext={()=>go(9)}/>;
      case 9:  return <QualityOfLife d={data} set={set} onBack={()=>go(8)} onNext={()=>go(10)}/>;
      case 10: return <OtherActivities d={data} set={set} onBack={()=>go(9)} onNext={()=>go(11)}/>;
      case 11: return <Review onBack={()=>go(10)} onSubmit={handleSubmit} submitting={submitting} submitError={submitError}/>;
      case 12: return <ThankYou token={token}/>;
      default: return null;
    }
  };

  return (
    <div style={{minHeight:'100vh',background:'linear-gradient(160deg,#EEF2FF 0%,#F4F6FB 40%,#EDF7F4 100%)'}}>
      <nav style={{position:'sticky',top:0,zIndex:100,background:'rgba(255,255,255,.9)',backdropFilter:'blur(12px)',borderBottom:'1px solid rgba(0,0,0,.06)',padding:'0 14px'}}>
        <div style={{maxWidth:660,margin:'0 auto',height:50,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:7}}>
            <div style={{width:28,height:28,background:'#1B4E7A',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center'}}>
              <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="#fff" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>
            </div>
            <span style={{fontWeight:600,fontSize:13,color:'#1F2937'}}>Knee Outcomes Platform</span>
          </div>
          <button onClick={()=>setView(v=>v==='survey'?'admin':'survey')}
            style={{fontSize:11,fontWeight:500,color:'#6B7280',background:'#F3F4F6',border:'none',cursor:'pointer',padding:'4px 10px',borderRadius:7}}>
            {view==='survey'?'🔐 Admin':'📋 Survey'}
          </button>
        </div>
      </nav>
      <main style={{maxWidth:580,margin:'0 auto',padding:'18px 14px 56px'}}>
        {view==='survey'?(
          <>
            {step>0&&step<12&&<ProgressBar step={step} total={TOTAL_STEPS}/>}
            <div className="card">{renderStep()}</div>
          </>
        ):(
          <div className={adminIn?'card':''} style={adminIn?{}:{background:'transparent',boxShadow:'none',border:'none'}}>
            {!adminIn?<AdminLogin onLogin={()=>setAdminIn(true)}/>:<AdminDashboard localSubs={localSubs} onLogout={()=>setAdminIn(false)}/>}
          </div>
        )}
      </main>
      <footer style={{textAlign:'center',padding:'0 0 20px',fontSize:10,color:'#C4C9D4'}}>
        Post-IPBSN Neurectomy / Knee Surgery Outcomes · Confidential · GDPR Compliant
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
