    .pill-btn:hover:not(.active) { border-color:#1B4E7A;background:#EFF6FF; }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const SUPABASE_URL      = "https://hvwafjnloufjkmnzqxkt.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_KDxPcw8CLQBVWjYFM4wrvg_JOFfTCEp";
const SB_HEADERS = {
  'apikey':        SUPABASE_ANON_KEY,
  'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
  'Content-Type':  'application/json',
};

function buildRow(rec) {
  const d = rec.data, sc = rec.scores || {};
  return {
    token:         rec.token,
    status:        rec.status,
    timestamp:     rec.timestamp,
    last_step:     STEP_NAMES[rec.lastStep] || String(rec.lastStep),
    contact_name:  d.contact_name  || '',
    contact_email: d.contact_email || '',
    contact_phone: d.contact_phone || '',
    survey_date:   d.survey_date   || '',
    dob:           d.dob       === 'dk' ? 'NK' : (d.dob       || ''),
    sex:           d.sex        || '',
    height:        d.height_ft === 'dk' ? 'NK' : `${d.height_ft||''}'${d.height_in||''}"`,
    weight:        d.weight    === 'dk' ? 'NK' : String(d.weight || ''),
    ethnicity:     d.ethnicity  || '',
    surgeon:       d.surgeon   === 'dk' ? 'NK' : (d.surgeon   || ''),
    side:          d.side       || '',
    kss_sym:       sc.sym        ?? null,
    kss_sat:       sc.sat        ?? null,
    kss_exp:       sc.exp        ?? null,
    kss_wlk:       sc.wlk        ?? null,
    kss_std:       sc.std        ?? null,
    kss_adv:       sc.adv        ?? null,
    kss_disc:      sc.disc       ?? null,
    kss_func:      sc.func       ?? null,
    kss_subj:      sc.subjective ?? null,
    vas_postop:    sc.vas        ?? null,
    vas_preop:     sc.vas_preop  ?? null,
    vas_delta:     sc.vas_delta  ?? null,
    global_sat:    d.global_sat  || '',
    promis_lef:    sc.lefRaw     ?? null,
    promis_pi:     sc.piRaw      ?? null,
    promis_pif:    sc.pifRaw     ?? null,
    eq_mob:        d.eq_mob  ? Number(d.eq_mob)  : null,
    eq_self:       d.eq_self ? Number(d.eq_self) : null,
    eq_usual:      d.eq_usual? Number(d.eq_usual): null,
    eq_pain:       d.eq_pain ? Number(d.eq_pain) : null,
    eq_anx:        d.eq_anx  ? Number(d.eq_anx)  : null,
    eq5d_sum:      sc.eq5dSum ?? null,
    eq_vas:        sc.eqVas   ?? null,
  };
}

async function sendToSupabase(rec) {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/responses?on_conflict=token`,
      {
        method:  'POST',
        headers: { ...SB_HEADERS, 'Prefer': 'resolution=merge-duplicates,return=minimal' },
        body:    JSON.stringify(buildRow(rec)),
      }
    );
    if (!res.ok) {
      const err = await res.text();
      console.error('Supabase error:', err);
      return { ok: false, error: err };
    }
    return { ok: true };
  } catch(e) {
    console.error('Supabase POST failed:', e);
    return { ok: false, error: String(e) };
  }
}

async function fetchFromSupabase() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/responses?select=*&order=timestamp.desc`,
      { headers: SB_HEADERS }
    );
    if (!res.ok) return null;
    return await res.json();
  } catch(e) {
    console.error('Supabase GET failed:', e);
    return null;
  }
}
  
const ADMIN_PASSWORD = "ipbsnRNOH26";
const TOTAL_STEPS = 17;
const SAT_OPTIONS = [{label:"Very Satisfied",value:8},{label:"Satisfied",value:6},{label:"Neutral",value:4},{label:"Dissatisfied",value:2},{label:"Very Dissatisfied",value:0}];
const EXP_OPTIONS = [{label:"Much better than expected",value:5},{label:"Better than expected",value:4},{label:"Same as expected",value:3},{label:"Worse than expected",value:2},{label:"Much worse than expected",value:1}];
const DIFF_OPTIONS = [{label:"No difficulty",value:5},{label:"Mild difficulty",value:4},{label:"Moderate difficulty",value:3},{label:"Severe difficulty",value:2},{label:"Requires help",value:1},{label:"Unable to do",value:0}];
const PROMIS_LEF_OPTIONS = [{label:"Without any difficulty",value:5},{label:"With a little difficulty",value:4},{label:"With some difficulty",value:3},{label:"With much difficulty",value:2},{label:"Unable to do",value:1}];
const PROMIS_PIF_OPTIONS = [{label:"Not at all",value:1},{label:"A little bit",value:2},{label:"Somewhat",value:3},{label:"Quite a bit",value:4},{label:"Very much",value:5}];
const EQ5D_OPTIONS = [{label:"No problems",value:1},{label:"Slight problems",value:2},{label:"Moderate problems",value:3},{label:"Severe problems",value:4},{label:"Extreme problems / unable to",value:5}];
const DISC_ACTIVITIES = [
  // Everyday activities
  "Walking / leisure walks",
  "Shopping / errands on foot",
  "Light housework",
  "Cooking / standing in kitchen",
  "Visiting family / grandchildren",
  "Travelling / day trips",
  "Church / community activities",
  "Volunteering",
  // Recreational
  "Gardening / yard work",
  "Swimming",
  "Cycling",
  "Dancing",
  "Golf",
  "Bowls / lawn bowls",
  "Yoga / Pilates / stretching",
  "Aerobics / gym classes",
  "Hiking / walking for exercise",
  "Jogging / running",
  "Tennis",
  "Skiing / snowboarding",
  "Other recreational sport",
];
const WALKING_AIDS_OPTS = [{label:"No walking aids needed",value:10},{label:"Cane occasionally",value:7},{label:"Cane routinely",value:4},{label:"Two canes or crutches",value:2},{label:"Walker or unable without support",value:0}];
const STANDING_OPTS = [{label:"Unlimited",value:10},{label:"More than 30 minutes",value:8},{label:"10–30 minutes",value:6},{label:"5–10 minutes",value:4},{label:"Less than 5 minutes",value:2},{label:"Unable to stand",value:0}];
const WALKING_DIST_OPTS = [{label:"Unlimited (more than 1 mile)",value:10},{label:"6–10 blocks",value:8},{label:"3–5 blocks",value:6},{label:"1–2 blocks",value:4},{label:"Around house only",value:2},{label:"Unable to walk",value:0}];
const VAS_COLORS = ['#22C55E','#4ADE80','#86EFAC','#BEF264','#FCD34D','#FBBF24','#F59E0B','#FB923C','#F97316','#EF4444','#DC2626'];
const STEP_NAMES = {1:"Contact Info",2:"Demographics",3:"KSS Symptoms",4:"KSS Satisfaction",5:"KSS Expectations",6:"KSS Walking & Standing",7:"KSS Standard Activities",8:"KSS Advanced Activities",9:"KSS Discretionary",10:"VAS Pain (Post-op)",11:"VAS Pain (Pre-op Recall)",12:"Global Satisfaction",13:"PROMIS LEF",14:"PROMIS Pain Intensity",15:"PROMIS Pain Interference",16:"EQ-5D",17:"Review"};

function calcScores(d) {
  const int=(v,def=0)=>parseInt(v??def)||0;
  const sym=int(d.b1_walk)+int(d.b1_stairs)+int(d.b1_normal);
  const sat=['b2_sit','b2_lie','b2_getup','b2_house','b2_rec'].reduce((s,k)=>s+int(d[k]),0);
  const exp=['b3_pain','b3_func','b3_overall'].reduce((s,k)=>s+int(d[k]),0);
  const wlk=int(d.b4_aids)+int(d.b4_stand)+int(d.b4_dist);
  const std=['b4s_up','b4s_dn','b4s_kneel','b4s_rise','b4s_floor','b4s_lat'].reduce((s,k)=>s+int(d[k]),0);
  const adv=['b4a_twist','b4a_floor','b4a_run','b4a_jump','b4a_stop'].reduce((s,k)=>s+int(d[k]),0);
  const sel=d.disc_sel||[];
  const disc=sel.slice(0,3).reduce((s,a)=>s+int(d['disc_'+a]),0);
  const func=wlk+std+adv+disc;
  const subjective=sym+sat+exp;
  const vas=int(d.vas);
  const vas_preop=d.vas_preop!==undefined?int(d.vas_preop):null;
  const vas_delta=vas_preop!==null?vas-vas_preop:null;
  const lefRaw=['lef1','lef2','lef3','lef4'].reduce((s,k)=>s+int(d[k]),0);
  const piRaw=int(d.pi1)+int(d.pi2)+int(d.pi3);
  const pifRaw=['pif1','pif2','pif3','pif4'].reduce((s,k)=>s+int(d[k]),0);
  const eq5dSum=['eq_mob','eq_self','eq_usual','eq_pain','eq_anx'].reduce((s,k)=>s+int(d[k]),0);
  const eqVas=int(d.eq_vas,50);
  return {sym,sat,exp,wlk,std,adv,disc,func,subjective,vas,vas_preop,vas_delta,lefRaw,piRaw,pifRaw,eq5dSum,eqVas};
}

function genToken() {
  const ts=Date.now().toString(36).toUpperCase(),rand=Math.random().toString(36).slice(2,6).toUpperCase();
  return `KNE-${ts}-${rand}`;
}

function ProgressBar({step,total}) {
  const pct=Math.round((step/total)*100);
  return (
    <div style={{marginBottom:20}}>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:12,fontWeight:500,color:'#9CA3AF',marginBottom:6}}>
        <span>{STEP_NAMES[step]||''}</span><span>Step {step} of {total} · {pct}%</span>
      </div>
      <div style={{height:6,background:'#E5E7EB',borderRadius:3,overflow:'hidden'}}>
        <div className="prog-bar" style={{height:'100%',width:`${pct}%`,background:'linear-gradient(90deg,#1B4E7A,#2E7DAF)',borderRadius:3}}/>
      </div>
    </div>
  );
}

function SectionHeader({tag,title,subtitle}) {
  return (
    <div style={{marginBottom:24}}>
      {tag&&<p style={{fontSize:12,fontWeight:600,letterSpacing:'.08em',color:'#2E7DAF',textTransform:'uppercase',marginBottom:4}}>{tag}</p>}
      <h2 className="serif" style={{fontSize:24,fontWeight:700,color:'#111827',lineHeight:1.25,marginBottom:subtitle?6:0}}>{title}</h2>
      {subtitle&&<p style={{fontSize:15,color:'#6B7280',lineHeight:1.5}}>{subtitle}</p>}
    </div>
  );
}

function OptBtn({label,active,onClick}) {
  return <button type="button" className={`opt-btn${active?' active':''}`} onClick={onClick}>{label}</button>;
}

function NavBtns({onBack,onNext,nextLabel='Continue →',disabled=false}) {
  return (
    <div style={{display:'flex',gap:10,marginTop:24}}>
      {onBack&&<button type="button" className="btn-secondary" onClick={onBack}>← Back</button>}
      <button type="button" className="btn-primary" onClick={onNext} disabled={disabled}>{nextLabel}</button>
    </div>
  );
}

function ScoreBadge({label,score,max}) {
  return (
    <div className="score-badge" style={{marginTop:16}}>
      <p style={{fontSize:12,color:'#6B7280',marginBottom:2}}>{label}</p>
      <p style={{fontSize:28,fontWeight:700,color:'#1B4E7A',fontFamily:'Fraunces,serif'}}>{score}<span style={{fontSize:14,fontWeight:400,color:'#9CA3AF'}}>/{max}</span></p>
    </div>
  );
}

function SliderField({label,sublabel,value,min=0,max=10,onChange,leftLabel,rightLabel,colorClass,accentColor}) {
  const pct=((value-min)/(max-min))*100,col=accentColor||'#1B4E7A';
  return (
    <div style={{marginBottom:20}}>
      {label&&<label style={{display:'block',fontWeight:600,color:'#1F2937',marginBottom:4}}>{label}</label>}
      {sublabel&&<p style={{fontSize:13,color:'#9CA3AF',marginBottom:8}}>{sublabel}</p>}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
        <span style={{fontSize:12,color:'#9CA3AF'}}>{leftLabel??min}</span>
        <span style={{fontSize:32,fontWeight:700,color:col,fontFamily:'Fraunces,serif',lineHeight:1}}>{value}</span>
        <span style={{fontSize:12,color:'#9CA3AF'}}>{rightLabel??max}</span>
      </div>
      <input type="range" className={`vas-slider${colorClass?' '+colorClass:''}`} min={min} max={max} value={value} style={{'--pct':`${pct}%`}} onChange={e=>onChange(Number(e.target.value))}/>
    </div>
  );
}

function FormField({label,required,error,children,hint}) {
  return (
    <div style={{marginBottom:16}}>
      <label style={{display:'block',fontSize:14,fontWeight:500,color:'#374151',marginBottom:6}}>
        {label}{required&&<span style={{color:'#EF4444'}}> *</span>}
        {hint&&<span style={{fontWeight:400,color:'#9CA3AF',marginLeft:6,fontSize:13}}>({hint})</span>}
      </label>
      {children}
      {error&&<p style={{fontSize:12,color:'#EF4444',marginTop:4}}>{error}</p>}
    </div>
  );
}

function Welcome({onStart}) {

        <svg width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="#fff" strokeWidth="1.8"><path strokeLinecap="round" strokeLinejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>

function ContactInfo({d,set,token,onNext}) {
  const [errors,setErrors]=useState({});
  const next=()=>{
    const e={};
    if(!d.contact_name||!d.contact_name.trim()) e.contact_name='Please enter your full name';
    if(!d.contact_email||!d.contact_email.trim()) e.contact_email='Please enter your email address';
    else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(d.contact_email)) e.contact_email='Please enter a valid email address';
    if(!d.contact_phone||!d.contact_phone.trim()) e.contact_phone='Please enter your phone number';
    if(!d.survey_date) e.survey_date='Please enter today\'s date';
    setErrors(e);
    if(!Object.keys(e).length) onNext();
  };
  return (
    <div className="fade-up">
      <SectionHeader tag="Step 1 · Your Details" title="Before we begin" subtitle="We need a few details so we can match your responses to your records."/>
      <div style={{background:'#FFF7ED',border:'1px solid #FED7AA',borderRadius:14,padding:'12px 16px',marginBottom:20,fontSize:13,color:'#92400E',display:'flex',gap:10}}>
        <span>ℹ️</span><span>Your details are stored securely and never shared outside the research team.</span>
      </div>
      <FormField label="Today's Date" required error={errors.survey_date}>
        <input type="date" className={`inp${errors.survey_date?' err':''}`} value={d.survey_date||''} onChange={e=>set('survey_date',e.target.value)}/>
      </FormField>
      <FormField label="Full Name" required error={errors.contact_name}>
        <input type="text" className={`inp${errors.contact_name?' err':''}`} placeholder="e.g. Jane Smith" value={d.contact_name||''} onChange={e=>set('contact_name',e.target.value)}/>
      </FormField>
      <FormField label="Email Address" required error={errors.contact_email}>
        <input type="email" className={`inp${errors.contact_email?' err':''}`} placeholder="e.g. jane@email.com" value={d.contact_email||''} onChange={e=>set('contact_email',e.target.value)}/>
      </FormField>
      <FormField label="Phone Number" required error={errors.contact_phone}>
        <input type="tel" className={`inp${errors.contact_phone?' err':''}`} placeholder="e.g. 07700 900000" value={d.contact_phone||''} onChange={e=>set('contact_phone',e.target.value)}/>

                          <td style={{padding:'9px 10px'}}>{d.side&&<span style={{padding:'2px 8px',borderRadius:20,fontSize:10,fontWeight:600,background:d.side==='Left'?'#DBEAFE':'#EDE9FE',color:d.side==='Left'?'#1E40AF':'#6D28D9'}}>{d.side}</span>}</td>
                          <td style={{padding:'9px 10px',maxWidth:80,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.surgeon==='dk'?'NK':d.surgeon||'—'}</td>
                          <td style={{padding:'9px 10px',maxWidth:90,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.contact_name||'—'}</td>
                          <td style={{padding:'9px 10px',fontSize:11,color:'#6B7280'}}>{STEP_NAMES[s.lastStep]||'—'}</td>
                          <td style={{padding:'9px 10px',fontWeight:600,color:'#1B4E7A',textAlign:'center'}}>{sc.vas!==undefined?sc.vas:'—'}</td>
                          <td style={{padding:'9px 10px',fontWeight:600,color:'#7C3AED',textAlign:'center'}}>{sc.vas_preop!==null&&sc.vas_preop!==undefined?sc.vas_preop:'—'}</td>
                          <td style={{padding:'9px 10px',fontWeight:600,textAlign:'center',color:delta<0?'#16A34A':delta>0?'#DC2626':'#6B7280'}}>{delta!==null&&delta!==undefined?(delta>0?`+${delta}`:delta):'—'}</td>
                          <td style={{padding:'9px 10px',fontWeight:600,color:'#1B4E7A',textAlign:'center'}}>{sc.func!==undefined?sc.func:'—'}</td>
                          <td style={{padding:'9px 10px'}}><button onClick={()=>setExpanded(isExp?null:s.id)} style={{fontSize:11,color:'#1B4E7A',background:'#EFF6FF',border:'none',cursor:'pointer',padding:'4px 10px',borderRadius:8,fontWeight:600}}>{isExp?'Close':'Details'}</button></td>
                        </tr>
                        {isExp&&(
                          <tr><td colSpan={12} style={{background:'#F8FAFF',padding:0}}>
                            <div style={{padding:'16px',display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:8}}>
                              {(d.contact_email||d.contact_phone)&&(
                                <div style={{gridColumn:'1/-1',background:'#FFFBEB',border:'1px solid #FDE68A',borderRadius:12,padding:'12px 14px'}}>
                                  <div style={{display:'flex',gap:16,flexWrap:'wrap',fontSize:13,color:'#78350F'}}>
                                    {d.contact_name&&<span>👤 {d.contact_name}</span>}
                                    {d.contact_email&&<span>✉️ <a href={`mailto:${d.contact_email}`} style={{color:'#1B4E7A'}}>{d.contact_email}</a></span>}
                                    {d.contact_phone&&<span>📱 {d.contact_phone}</span>}
                                  </div>
                                </div>
                              )}
                              {[['KSS Wlk/Stand',sc.wlk,30],['KSS Standard',sc.std,30],['KSS Advanced',sc.adv,25],['KSS Disc.',sc.disc,15],['PROMIS LEF',sc.lefRaw,20],['PROMIS Pain Int.',sc.piRaw,30],['PROMIS Pain Interf.',sc.pifRaw,20],['EQ-5D Sum',sc.eq5dSum,25],['Global Satisfaction',d.global_sat||'—',null],['Ethnicity',d.ethnicity||'—',null]].map(([lbl,val,mx])=>(
                                <div key={lbl} style={{display:'flex',justifyContent:'space-between',alignItems:'center',background:'#fff',padding:'8px 12px',borderRadius:10,fontSize:12}}>
                                  <span style={{color:'#6B7280'}}>{lbl}</span>
                                  <span style={{fontWeight:600,color:'#1B4E7A'}}>{val}{mx&&typeof val==='number'?<span style={{fontWeight:400,color:'#D1D5DB'}}>/{mx}</span>:''}</span>
                                </div>
                              ))}
                            </div>
                          </td></tr>
                        )}
                      </React.Fragment>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </>
      )}

      {tab==='dropoffs'&&(
        <div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:16}}>
            {[{l:'Started',v:subs.length,c:'#1B4E7A'},{l:'Completed',v:complete.length,c:'#16A34A'},{l:'Dropped off',v:partial.length,c:'#D97706'}].map(c=>(
              <div key={c.l} style={{background:'#fff',borderRadius:14,padding:'14px',textAlign:'center',border:'1px solid #F3F4F6'}}>
                <p style={{fontSize:10,color:'#9CA3AF',marginBottom:3,textTransform:'uppercase'}}>{c.l}</p>
                <p style={{fontSize:28,fontWeight:700,fontFamily:'Fraunces,serif',color:c.c}}>{c.v}</p>
                {c.l==='Dropped off'&&subs.length>0&&<p style={{fontSize:11,color:'#9CA3AF'}}>{Math.round((partial.length/subs.length)*100)}% rate</p>}
              </div>
            ))}
          </div>
          {Object.keys(dropOffSteps).length>0&&(
            <div style={{background:'#fff',borderRadius:16,padding:'16px',marginBottom:16,border:'1px solid #F3F4F6'}}>
              <p style={{fontWeight:600,color:'#1F2937',marginBottom:12}}>Where patients dropped off</p>
              {Object.entries(dropOffSteps).sort((a,b)=>b[1]-a[1]).map(([step,count])=>(
                <div key={step} style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                  <span style={{fontSize:12,color:'#374151',width:180,flexShrink:0}}>{step}</span>
                  <div style={{flex:1,height:8,background:'#F3F4F6',borderRadius:4,overflow:'hidden'}}><div style={{height:'100%',width:`${(count/Math.max(...Object.values(dropOffSteps)))*100}%`,background:'#F59E0B',borderRadius:4}}/></div>
                  <span style={{fontSize:13,fontWeight:600,color:'#D97706',width:20,textAlign:'right'}}>{count}</span>
                </div>
              ))}
            </div>
          )}
          <div style={{background:'#fff',borderRadius:16,padding:'16px',border:'1px solid #F3F4F6'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <p style={{fontWeight:600,color:'#1F2937'}}>Contactable patients</p>
              <button onClick={exportFollowUp} style={{fontSize:12,color:'#F59E0B',fontWeight:600,background:'#FFFBEB',border:'1px solid #FDE68A',borderRadius:8,padding:'5px 12px',cursor:'pointer'}}>Export</button>
            </div>
            {partial.filter(s=>s.data.contact_email||s.data.contact_phone).length===0?(
              <p style={{fontSize:13,color:'#9CA3AF',textAlign:'center',padding:'20px 0'}}>No contactable partial completions yet.</p>
            ):(
              partial.filter(s=>s.data.contact_email||s.data.contact_phone).map(s=>(
                <div key={s.id} style={{display:'flex',justifyContent:'space-between',padding:'12px 0',borderBottom:'1px solid #F9FAFB',flexWrap:'wrap',gap:8}}>
                  <div>
                    <p style={{fontWeight:600,color:'#1F2937',fontSize:14}}>{s.data.contact_name||'Anonymous'}</p>
                    {s.data.contact_email&&<p style={{fontSize:12,color:'#1B4E7A'}}><a href={`mailto:${s.data.contact_email}`}>{s.data.contact_email}</a></p>}
                    {s.data.contact_phone&&<p style={{fontSize:12,color:'#6B7280'}}>{s.data.contact_phone}</p>}
                  </div>
                  <div style={{textAlign:'right'}}>
                    <span className="status-pill status-partial" style={{display:'block',marginBottom:4}}>Stopped: {STEP_NAMES[s.lastStep]||`Step ${s.lastStep}`}</span>
                    <span style={{fontSize:11,color:'#9CA3AF'}}>{new Date(s.timestamp).toLocaleDateString('en-GB')}</span>
                  </div>
                </div>
              ))
            )}
          </div>
        </div>
      )}

      {tab==='analytics'&&(
        <div>
          {complete.length===0?(
            <div style={{textAlign:'center',padding:'48px 24px',background:'#fff',borderRadius:16}}>
              <p style={{fontSize:32,marginBottom:8}}>📊</p><p style={{fontWeight:600,color:'#4B5563'}}>No complete submissions yet</p>
            </div>
          ):(
            <>
              <div style={{background:'#fff',borderRadius:16,padding:'20px',marginBottom:12,border:'1px solid #F3F4F6'}}>
                <p style={{fontWeight:600,color:'#1F2937',marginBottom:16}}>VAS Pain: Pre-op Recall vs Post-op</p>
                {(()=>{const pres=complete.filter(s=>s.scores.vas_preop!==null);return[['Pre-op recall avg',pres.length?pres.reduce((s,r)=>s+r.scores.vas_preop,0)/pres.length:null,'#7C3AED'],['Post-op avg',complete.reduce((s,r)=>s+r.scores.vas,0)/complete.length,'#1B4E7A'],['Mean improvement',pres.length?pres.reduce((s,r)=>s+r.scores.vas_preop-r.scores.vas,0)/pres.length:null,'#16A34A']].map(([lbl,v,col])=>v===null?null:(
                  <div key={lbl} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 0',borderBottom:'1px solid #F9FAFB'}}>
                    <span style={{fontSize:14,color:'#374151'}}>{lbl}</span>
                    <span style={{fontSize:22,fontWeight:700,fontFamily:'Fraunces,serif',color:col}}>{v.toFixed(1)}/10</span>
                  </div>
                ));})()}
              </div>
              <div style={{background:'#fff',borderRadius:16,padding:'20px',border:'1px solid #F3F4F6'}}>
                <p style={{fontWeight:600,color:'#1F2937',marginBottom:16}}>KSS Score Averages</p>
                {[{l:'Symptoms (/25)',fn:s=>s.scores.sym,max:25},{l:'Satisfaction (/40)',fn:s=>s.scores.sat,max:40},{l:'Expectations (/15)',fn:s=>s.scores.exp,max:15},{l:'Functional (/100)',fn:s=>s.scores.func,max:100}].map(({l,fn,max})=>{
                  const a=complete.reduce((s,r)=>s+fn(r),0)/complete.length;
                  return(<div key={l} style={{marginBottom:14}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}><span style={{fontSize:13,color:'#374151'}}>{l}</span><span style={{fontSize:13,fontWeight:600,color:'#1B4E7A'}}>{a.toFixed(1)}</span></div><div style={{height:8,background:'#F3F4F6',borderRadius:4,overflow:'hidden'}}><div style={{height:'100%',width:`${(a/max)*100}%`,background:'linear-gradient(90deg,#1B4E7A,#2E7DAF)',borderRadius:4}}/></div></div>);
                })}
              </div>
            </>
          )}
        </div>
      )}
    </div>
  );
}

function App() {
  const [view,setView]=useState('survey');
  const [step,setStep]=useState(0);
  const [token]=useState(()=>genToken());
  const [data,setData]=useState({survey_date:new Date().toISOString().split('T')[0],b1_walk:0,b1_stairs:0,vas:5,vas_preop:5,eq_vas:50,pi1:0,pi2:0,pi3:0});
  const [subs,setSubs]=useState([]);
  const [adminIn,setAdminIn]=useState(false);

  const [submitting, setSubmitting] = useState(false);
  const [submitError, setSubmitError] = useState('');

  const set=useCallback((k,v)=>setData(p=>({...p,[k]:v})),[]);

  const go=useCallback((n)=>{
    setStep(n);
    window.scrollTo({top:0,behavior:'smooth'});
    if(n>0&&n<18){
      setSubs(prev=>{
        const scores=calcScores(data);
        const rec={id:token,token,timestamp:new Date().toISOString(),lastStep:n,status:'partial',data:{...data},scores};
        const existing=prev.findIndex(s=>s.token===token);
        if(existing>=0){const u=[...prev];u[existing]=rec;return u;}
        return [...prev,rec];
      });
    }
  },[data,token]);

  const handleSubmit=async()=>{
    setSubmitting(true);
    setSubmitError('');
    const scores=calcScores(data);
    const rec={id:token,token,timestamp:new Date().toISOString(),lastStep:17,status:'complete',data:{...data},scores};
    const result = await sendToSupabase(rec);
    if (!result.ok) {
      setSubmitError('Something went wrong saving your answers. Please try again.');
      setSubmitting(false);
      return;
    }
    setSubs(prev=>{const existing=prev.findIndex(s=>s.token===token);if(existing>=0){const u=[...prev];u[existing]=rec;return u;}return[...prev,rec];});
    setSubmitting(false);
    setStep(18);
    window.scrollTo({top:0,behavior:'smooth'});
  };

  const scores=calcScores(data);

  const renderStep=()=>{
    switch(step){
      case 0:  return <Welcome onStart={()=>go(1)}/>;
      case 1:  return <ContactInfo d={data} set={set} token={token} onNext={()=>go(2)}/>;
      case 2:  return <Demographics d={data} set={set} onBack={()=>go(1)} onNext={()=>go(3)}/>;
      case 3:  return <KSSSymptoms d={data} set={set} onBack={()=>go(2)} onNext={()=>go(4)}/>;
      case 4:  return <KSSSatisfaction d={data} set={set} onBack={()=>go(3)} onNext={()=>go(5)}/>;
      case 5:  return <KSSExpectations d={data} set={set} onBack={()=>go(4)} onNext={()=>go(6)}/>;
      case 6:  return <KSSWalking d={data} set={set} onBack={()=>go(5)} onNext={()=>go(7)}/>;
      case 7:  return <KSSStandard d={data} set={set} onBack={()=>go(6)} onNext={()=>go(8)}/>;
      case 8:  return <KSSAdvanced d={data} set={set} onBack={()=>go(7)} onNext={()=>go(9)}/>;
      case 9:  return <KSSDiscretionary d={data} set={set} onBack={()=>go(8)} onNext={()=>go(10)}/>;
      case 10: return <VASPostOp d={data} set={set} onBack={()=>go(9)} onNext={()=>go(11)}/>;
      case 11: return <VASPreOpRecall d={data} set={set} onBack={()=>go(10)} onNext={()=>go(12)}/>;
      case 12: return <GlobalSat d={data} set={set} onBack={()=>go(11)} onNext={()=>go(13)}/>;
      case 13: return <PROMISLef d={data} set={set} onBack={()=>go(12)} onNext={()=>go(14)}/>;
      case 14: return <PROMISPainIntensity d={data} set={set} onBack={()=>go(13)} onNext={()=>go(15)}/>;
      case 15: return <PROMISPainInterference d={data} set={set} onBack={()=>go(14)} onNext={()=>go(16)}/>;
      case 16: return <EQ5D d={data} set={set} onBack={()=>go(15)} onNext={()=>go(17)}/>;
      case 17: return <Review d={data} scores={scores} onBack={()=>go(16)} onSubmit={handleSubmit} submitting={submitting} submitError={submitError}/>;
      case 18: return <ThankYou token={token}/>;
      default: return null;
    }
  };

  return (
    <div style={{minHeight:'100vh',background:'linear-gradient(160deg,#EEF2FF 0%,#F4F6FB 40%,#EDF7F4 100%)'}}>
      <nav style={{position:'sticky',top:0,zIndex:100,background:'rgba(255,255,255,.88)',backdropFilter:'blur(12px)',borderBottom:'1px solid rgba(0,0,0,.06)',padding:'0 16px'}}>
        <div style={{maxWidth:680,margin:'0 auto',height:52,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <div style={{width:30,height:30,background:'#1B4E7A',borderRadius:9,display:'flex',alignItems:'center',justifyContent:'center'}}>
              <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#fff" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>
            </div>
            <span style={{fontWeight:600,fontSize:14,color:'#1F2937'}}>Knee Outcomes Platform</span>
          </div>
          <button onClick={()=>setView(v=>v==='survey'?'admin':'survey')} style={{fontSize:12,fontWeight:500,color:'#6B7280',background:'#F3F4F6',border:'none',cursor:'pointer',padding:'5px 12px',borderRadius:8}}>
            {view==='survey'?'🔐 Admin':'📋 Survey'}
          </button>
        </div>
      </nav>
      <main style={{maxWidth:600,margin:'0 auto',padding:'20px 16px 60px'}}>
        {view==='survey'?(
          <>
            {step>0&&step<18&&<ProgressBar step={step} total={TOTAL_STEPS}/>}
            <div className="card">{renderStep()}</div>
          </>
        ):(
          <div className={adminIn?'card':''} style={adminIn?{}:{background:'transparent',boxShadow:'none',border:'none'}}>
            {!adminIn?<AdminLogin onLogin={()=>setAdminIn(true)}/>:<AdminDashboard localSubs={subs} onLogout={()=>setAdminIn(false)}/>}
          </div>
        )}
      </main>
      <footer style={{textAlign:'center',padding:'0 0 24px',fontSize:11,color:'#C4C9D4'}}>Post-IPBSN Neurectomy / Knee Surgery Outcomes Platform · Confidential · GDPR Compliant</footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
